# Project-wide Gradle settings.

# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE are ignored when building from the command line, check
# build.gradle files instead.

# When configured, Gradle will run in offline mode and not attempt to download dependencies.
# org.gradle.offline=true

# Android preferences
# Specifies the JVM arguments used for the daemon process.
# The setting is particularly useful for headless machines.
# org.gradle.jvmargs=-Xmx1536m

# When set to true the Gradle daemon is used to build the project, speeding up subsequent builds.
# This option is ignored if the Gradle daemon is already running.
# org.gradle.daemon=true

# Kotlin
kotlin.code.style=official
